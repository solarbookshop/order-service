<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 680" width="100%" height="100%">
  <defs>
    <!-- Sharp, professional arrowhead marker -->
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 2 L 8 5 L 0 8 Z" fill="#4a5568" />
    </marker>

    <style>
      .bg-white { fill: #ffffff; }
      .boundary-box { stroke: #cbd5e0; stroke-width: 1.5; stroke-dasharray: 6 4; fill: none; }
      .header-text { font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 16px; font-weight: 700; fill: #1a202c; letter-spacing: -0.01em; }
      .node-rect { fill: #d2e6fc; stroke: #3182ce; stroke-width: 1.5; }
      .node-cylinder { fill: #f7fafc; stroke: #4a5568; stroke-width: 1.5; }
      .node-text { font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 13.5px; font-weight: 600; fill: #2d3748; text-anchor: middle; }
      .label-text { font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 13px; font-weight: 500; fill: #2d3748; }
      .label-text-center { text-anchor: middle; }
      .label-text-start { text-anchor: start; }
      .arrow-line { stroke: #4a5568; stroke-width: 1.5; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
      .user-icon { fill: #2d3748; }
    </style>
  </defs>

  <!-- Background Canvas -->
  <rect width="1000" height="680" class="bg-white" />

  <!-- ================================================================= -->
  <!-- 1. ACCEPT ORDER FLOW                                              -->
  <!-- ================================================================= -->
  <g id="accept-order-flow">
    <!-- Boundary Box -->
    <rect x="20" y="20" width="465" height="310" rx="4" ry="4" class="boundary-box" />
    <text x="252.5" y="45" class="header-text" text-anchor="middle">Accept order flow</text>

    <!-- User Node -->
    <g transform="translate(35, 120)">
      <!-- Head -->
      <circle cx="20" cy="12" r="8" class="user-icon" />
      <!-- Torso -->
      <path d="M 4,38 C 4,30 11,26 20,26 C 29,26 36,30 36,38 L 36,41 L 4,41 Z" class="user-icon" />
      <!-- Label -->
      <text x="20" y="55" class="node-text">User</text>
    </g>

    <!-- Arrow: User -> Order Service -->
    <path d="M 80,145 L 148,145" class="arrow-line" />
    <text x="114" y="118" class="label-text label-text-center">1. Submits</text>
    <text x="114" y="134" class="label-text label-text-center">order</text>

    <!-- Order Service Node -->
    <rect x="155" y="112.5" width="115" height="65" rx="4" ry="4" class="node-rect" />
    <text x="212.5" y="143" class="node-text">Order</text>
    <text x="212.5" y="159" class="node-text">Service</text>

    <!-- Arrow: Order Service -> Order Database -->
    <path d="M 212.5,180 L 212.5,224" class="arrow-line" />
    <text x="222" y="206" class="label-text label-text-start">2. Saves accepted order</text>

    <!-- Order Database Node -->
    <g id="db-accept">
      <!-- Cylinder Body -->
      <path d="M 172.5,240 v 50 a 40,10 0 0,0 80,0 v -50 Z" class="node-cylinder" />
      <!-- Cylinder Top -->
      <ellipse cx="212.5" cy="240" rx="40" ry="10" class="node-cylinder" />
      <!-- Cylinder Label -->
      <text x="212.5" y="268" class="node-text">Order</text>
      <text x="212.5" y="284" class="node-text">database</text>
    </g>

    <!-- Arrow: Order Service -> Event Broker -->
    <path d="M 272,145 L 354,145" class="arrow-line" />
    <text x="313" y="95" class="label-text label-text-center">2. Sends</text>
    <text x="313" y="112" class="label-text label-text-center">accepted order</text>
    <text x="313" y="129" class="label-text label-text-center">notification</text>

    <!-- Event Broker Node -->
    <g id="broker-accept">
      <!-- Cylinder Body (Horizontal) -->
      <path d="M 372,112.5 L 443,112.5 A 12,32.5 0 0,1 443,177.5 L 372,177.5 A 12,32.5 0 0,1 372,112.5 Z" class="node-cylinder" />
      <!-- Cylinder Flat Face -->
      <ellipse cx="443" cy="145" rx="12" ry="32.5" class="node-cylinder" />
      <!-- Label -->
      <text x="402" y="143" class="node-text">Event</text>
      <text x="402" y="159" class="node-text">broker</text>
    </g>
  </g>

  <!-- ================================================================= -->
  <!-- 2. DISPATCH ORDER FLOW                                            -->
  <!-- ================================================================= -->
  <g id="dispatch-order-flow">
    <!-- Boundary Box -->
    <rect x="515" y="20" width="465" height="310" rx="4" ry="4" class="boundary-box" />
    <text x="747.5" y="45" class="header-text" text-anchor="middle">Dispatch order flow</text>

    <!-- Event Broker Node -->
    <g id="broker-dispatch">
      <!-- Cylinder Body -->
      <path d="M 542,112.5 L 613,112.5 A 12,32.5 0 0,1 613,177.5 L 542,177.5 A 12,32.5 0 0,1 542,112.5 Z" class="node-cylinder" />
      <!-- Cylinder Flat Face -->
      <ellipse cx="613" cy="145" rx="12" ry="32.5" class="node-cylinder" />
      <!-- Label -->
      <text x="573" y="143" class="node-text">Event</text>
      <text x="573" y="159" class="node-text">broker</text>
    </g>

    <!-- Arrow 1 (Top): Event Broker -> Dispatcher Service -->
    <path d="M 627,130 L 763,130" class="arrow-line" />
    <text x="695" y="80" class="label-text label-text-center">1. Receives</text>
    <text x="695" y="97" class="label-text label-text-center">accepted order</text>
    <text x="695" y="114" class="label-text label-text-center">notification</text>

    <!-- Arrow 2 (Bottom): Dispatcher Service -> Event Broker -->
    <path d="M 768,160 L 629,160" class="arrow-line" />
    <text x="695" y="191" class="label-text label-text-center">2. Sends</text>
    <text x="695" y="208" class="label-text label-text-center">dispatched order</text>
    <text x="695" y="225" class="label-text label-text-center">notification</text>

    <!-- Dispatcher Service Node -->
    <rect x="770" y="112.5" width="120" height="65" rx="4" ry="4" class="node-rect" />
    <text x="830" y="143" class="node-text">Dispatcher</text>
    <text x="830" y="159" class="node-text">Service</text>

    <!-- Self-Loop Arrow: Dispatcher Service -> Dispatcher Service -->
    <path d="M 890,145 C 925,145 925,210 850,210 L 850,184.5" class="arrow-line" />
    <text x="915" y="212" class="label-text label-text-center">2. Dispatches</text>
    <text x="915" y="228" class="label-text label-text-center">order</text>
  </g>

  <!-- ================================================================= -->
  <!-- 3. UPDATE ORDER STATUS FLOW                                       -->
  <!-- ================================================================= -->
  <g id="update-order-flow">
    <!-- Boundary Box -->
    <rect x="267.5" y="350" width="465" height="310" rx="4" ry="4" class="boundary-box" />
    <text x="500" y="375" class="header-text" text-anchor="middle">Update order status flow</text>

    <!-- Order Service Node -->
    <rect x="302.5" y="442.5" width="115" height="65" rx="4" ry="4" class="node-rect" />
    <text x="360" y="473" class="node-text">Order</text>
    <text x="360" y="489" class="node-text">Service</text>

    <!-- Arrow: Event Broker -> Order Service -->
    <path d="M 583,475 L 424,475" class="arrow-line" />
    <text x="503" y="410" class="label-text label-text-center">1. Receives</text>
    <text x="503" y="427" class="label-text label-text-center">dispatched order</text>
    <text x="503" y="444" class="label-text label-text-center">notification</text>

    <!-- Event Broker Node -->
    <g id="broker-update">
      <!-- Cylinder Body -->
      <path d="M 599.5,442.5 L 670.5,442.5 A 12,32.5 0 0,1 670.5,507.5 L 599.5,507.5 A 12,32.5 0 0,1 599.5,442.5 Z" class="node-cylinder" />
      <!-- Cylinder Flat Face -->
      <ellipse cx="670.5" cy="475" rx="12" ry="32.5" class="node-cylinder" />
      <!-- Label -->
      <text x="630.5" y="473" class="node-text">Event</text>
      <text x="630.5" y="489" class="node-text">broker</text>
    </g>

    <!-- Arrow: Order Service -> Order Database -->
    <path d="M 360,510 L 360,554" class="arrow-line" />
    <text x="370" y="536" class="label-text label-text-start">2. Updates order status</text>

    <!-- Order Database Node -->
    <g id="db-update">
      <!-- Cylinder Body -->
      <path d="M 320,570 v 50 a 40,10 0 0,0 80,0 v -50 Z" class="node-cylinder" />
      <!-- Cylinder Top -->
      <ellipse cx="360" cy="570" rx="40" ry="10" class="node-cylinder" />
      <!-- Label -->
      <text x="360" y="598" class="node-text">Order</text>
      <text x="360" y="614" class="node-text">database</text>
    </g>
  </g>
</svg>